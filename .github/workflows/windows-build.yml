name: Build Windows Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # optional: flutter-version: '3.x.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows Desktop Build
        run: flutter config --enable-windows-desktop

      - name: Build Windows App
        run: flutter build windows --release

      - name: Zip the Build
        run: Compress-Archive -Path ./build/windows/x64/runner/Release/* -DestinationPath ./benefit_scheme_windows_release.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: benefit_scheme_windows_release
          path: benefit_scheme_windows_release.zip
