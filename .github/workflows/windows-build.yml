name: Build Windows Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # optional: flutter-version: '3.x.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        shell: bash
        run: |
          echo "SUPABASE_URL=https://gcgbqvvqemttbexvzkme.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjZ2JxdnZxZW10dGJleHZ6a21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTUwNjcwNDEsImV4cCI6MjA3MDY0MzA0MX0.-dbxe51JxXZVTekNnBSGYKOUUJTm1PJIGV9TYRTz4jU" >> .env
          echo "GOOGLE_CLIENT_ID=524182354123-039shiqoq9kat1cujmbo91h7dk7crd5l.apps.googleusercontent.com" >> .env

      - name: Enable Windows Desktop Build
        run: flutter config --enable-windows-desktop

      - name: Build Windows App
        run: flutter build windows --release

      - name: Zip the Build
        run: Compress-Archive -Path ./build/windows/x64/runner/Release/* -DestinationPath ./benefit_scheme_windows_release.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: benefit_scheme_windows_release
          path: benefit_scheme_windows_release.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: benefit_scheme_windows_release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
